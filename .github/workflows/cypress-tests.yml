name: API Tests → Docker Build → Jenkins Deploy
# UI tests rodam apenas no Jenkins (evita redirect loop em IPs de CI)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1-5'   # Seg-Sex às 06h UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cypress-runner

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1 — Testes de API (Backend)
  # ────────────────────────────────────────────────────────────
  api-tests:
    name: "🔌 API Tests (Backend)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run API Tests
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/api/**/*.cy.js
          browser: chrome
          install-command: yarn install --frozen-lockfile
        # Allure é gerado apenas no Jenkins — não aqui

  # ────────────────────────────────────────────────────────────
  # JOB 2 — Build & Push Docker Image (só roda se API passou)
  # ────────────────────────────────────────────────────────────
  docker-build-push:
    name: "🐳 Build & Push Docker Image → ghcr.io"
    runs-on: ubuntu-latest
    needs: [api-tests]   # ← aguarda apenas API tests
    if: success() && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write              # necessário para push no ghcr.io

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # token automático do GitHub Actions

      - name: Extract Docker metadata (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build e Push da imagem Docker
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo do build
        run: |
          echo "### 🐳 Docker Image publicada com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ghcr.io" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # JOB 4 — Dispara Webhook no Jenkins
  # ────────────────────────────────────────────────────────────
  trigger-jenkins:
    name: "🚀 Trigger Jenkins Pipeline"
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: success()

    steps:
      - name: Disparar webhook no Jenkins
        continue-on-error: true   # não bloqueia pipeline se Jenkins não estiver acessível
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "${{ secrets.JENKINS_URL }}/job/${{ secrets.JENKINS_JOB_NAME }}/buildWithParameters" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            --data "DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            --data "GIT_COMMIT=${{ github.sha }}" \
            --data "TRIGGERED_BY=github-actions")
          echo "HTTP status: $HTTP_CODE"
          if [[ "$HTTP_CODE" == "201" || "$HTTP_CODE" == "200" ]]; then
            echo "✅ Jenkins acionado com sucesso!"
          else
            echo "⚠️ Jenkins não acessível (HTTP $HTTP_CODE) — acione manualmente se necessário."
          fi

      - name: Resumo do trigger
        run: |
          echo "### 🚀 Jenkins acionado!" >> $GITHUB_STEP_SUMMARY
          echo "**Job:** ${{ secrets.JENKINS_JOB_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Imagem:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # JOB 5 — Resumo final do pipeline
  # (Allure Report é gerado no Jenkins após o deploy)
  # ────────────────────────────────────────────────────────────
  pipeline-summary:
    name: "✅ Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [api-tests]
    if: always()

    steps:
      - name: Resumo do pipeline
        run: |
          echo "### ✅ Pipeline GitHub Actions finalizado!" >> $GITHUB_STEP_SUMMARY
          echo "- **API Tests**: validados no GitHub Actions" >> $GITHUB_STEP_SUMMARY
          echo "- **UI Tests**: executados exclusivamente no **Jenkins** (evita bloqueio de IP em CI)" >> $GITHUB_STEP_SUMMARY
          echo "- **Allure Report**: gerado pelo Jenkins após execução completa" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
